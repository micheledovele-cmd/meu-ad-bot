<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quizzus - Validação</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="11229956" data-sdk="show_11229956"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #0f0c29;
        }
        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 400px;
        }
        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h2 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 15px; color: #ccc; margin-bottom: 30px; line-height: 1.4; }
        #btn-ad {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            transition: all 0.3s;
        }
        #btn-ad:active { transform: scale(0.95); }
        #btn-ad:disabled { background: #444; box-shadow: none; opacity: 0.6; }
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">🔓</div>
        <h2 id="status-title">Quase lá!</h2>
        <p id="status-desc">Assista ao vídeo completo para validar seu acesso ao resultado.</p>
        
        <div class="loader" id="loader"></div>
        <button id="btn-ad">LIBERAR RESULTADO</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const btn = document.getElementById('btn-ad');
        const loader = document.getElementById('loader');
        const title = document.getElementById('status-title');
        const desc = document.getElementById('status-desc');

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            loader.style.display = 'block';
            btn.innerText = 'CARREGANDO...';

            try {
                if (typeof show_11229956 !== 'function') {
                    throw new Error("SDK não carregado");
                }

                console.log("Chamando Monetag...");
                await show_11229956('pop');
                
                // Sucesso
                title.innerText = "✅ VALIDADO!";
                desc.innerText = "Enviando seu resultado para o chat...";
                btn.style.display = 'none';
                loader.style.display = 'none';

                // Envia os dados para o bot
                tg.sendData(JSON.stringify({ status: "ad_completed" }));
                
                // Fecha após um tempo seguro
                setTimeout(() => tg.close(), 1000);

            } catch (err) {
                console.error(err);
                btn.disabled = false;
                loader.style.display = 'none';
                btn.innerText = 'TENTAR NOVAMENTE';
                tg.showAlert("Erro ao carregar vídeo. Verifique sua conexão.");
            }
        });
    </script>
</body>
</html>
