<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzus - Anúncio Premiado</title>

    <!-- SDK do Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 
        SDK da Monetag (Zone 11229956)
        Nota: O SDK deve ser carregado antes de qualquer tentativa de chamada.
    -->
    <script src="//libtl.com/sdk.js" data-zone="11229956" data-sdk="show_11229956"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #2ea6ff, #6c5ce7);
            --bg-gradient: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
            --text-color: #ffffff;
            --subtitle-color: #a0a0c0;
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 24px;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 24px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .icon { 
            font-size: 64px; 
            margin-bottom: 16px;
            filter: drop-shadow(0 0 10px rgba(46, 166, 255, 0.5));
        }

        h1 { 
            font-size: 22px; 
            margin: 0 0 12px;
            font-weight: 700;
        }

        p { 
            font-size: 15px; 
            color: var(--subtitle-color); 
            margin: 0 0 32px;
            line-height: 1.5;
        }

        #btn {
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            padding: 16px 28px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #btn:active { transform: scale(0.98); }
        #btn:disabled { 
            opacity: 0.7; 
            cursor: not-allowed;
            background: #4a4a6a;
            box-shadow: none;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Logs de debug visíveis apenas no console */
        .debug-status {
            position: fixed;
            bottom: 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon" id="main-icon">🎬</div>
        <h1 id="title">Resultado Pronto!</h1>
        <p id="subtitle">Assista a um anúncio rápido para desbloquear seu QI e Personalidade.</p>
        
        <button id="btn">
            <span class="spinner" id="spinner"></span>
            <span id="btn-text">Assistir Anúncio</span>
        </button>
    </div>

    <div class="debug-status" id="sdk-status">Aguardando SDK...</div>

    <script>
        // Inicialização do Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Elementos do DOM
        const btn = document.getElementById("btn");
        const btnText = document.getElementById("btn-text");
        const title = document.getElementById("title");
        const subtitle = document.getElementById("subtitle");
        const spinner = document.getElementById("spinner");
        const sdkStatus = document.getElementById("sdk-status");
        const mainIcon = document.getElementById("main-icon");

        const startTime = Date.now();

        // Sistema de Logs Detalhados
        function log(message, data = null) {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
            const logMsg = `[Quizzus-Ad] [${elapsed}s] ${message}`;
            console.log(logMsg, data || "");
            if (sdkStatus) sdkStatus.textContent = message;
        }

        // Verifica se o SDK foi carregado
        window.addEventListener('load', () => {
            log("Página carregada completamente");
            if (typeof show_11229956 === 'function') {
                log("SDK Monetag detectado e pronto");
            } else {
                log("Erro: SDK Monetag não encontrado no carregamento");
            }
        });

        // Função de Recompensa (Separada da lógica do anúncio)
        function rewardUser() {
            log("Executando rewardUser()...");
            // Envia a confirmação para o bot
            tg.sendData(JSON.stringify({ 
                status: "ad_completed",
                timestamp: Date.now(),
                zone: "11229956"
            }));
            
            // Pequeno delay para garantir o envio dos dados antes de fechar
            setTimeout(() => {
                log("Fechando WebApp");
                tg.close();
            }, 800);
        }

        // Tratamento de cliques
        btn.addEventListener("click", async () => {
            log("Botão clicado");
            
            // Estado de Carregamento
            btn.disabled = true;
            spinner.style.display = "inline-block";
            btnText.textContent = "Carregando anúncio...";
            title.textContent = "Preparando...";
            
            const adStartTime = Date.now();

            try {
                // Verificar disponibilidade da função
                if (typeof show_11229956 !== 'function') {
                    throw new Error("SDK da Monetag não está disponível (show_11229956 is undefined)");
                }

                log("Iniciando anúncio (Rewarded Pop)");
                
                // Chamada do SDK conforme documentação
                // show_11229956('pop') retorna uma Promise
                await show_11229956('pop');
                
                const adDuration = ((Date.now() - adStartTime) / 1000).toFixed(2);
                log(`Anúncio concluído com sucesso em ${adDuration}s`);
                
                // Sucesso
                title.textContent = "✅ Sucesso!";
                subtitle.textContent = "Sua recompensa foi liberada. Voltando...";
                mainIcon.textContent = "🏆";
                btnText.textContent = "Concluído";
                spinner.style.display = "none";
                
                rewardUser();

            } catch (error) {
                const errorTime = ((Date.now() - adStartTime) / 1000).toFixed(2);
                log(`Erro encontrado após ${errorTime}s:`, error.message);
                
                // Tratamento de Erro e Restauração
                title.textContent = "Ops! Algo deu errado";
                subtitle.textContent = "Não conseguimos carregar o anúncio. Por favor, tente novamente.";
                mainIcon.textContent = "⚠️";
                
                // Restaurar botão
                btn.disabled = false;
                spinner.style.display = "none";
                btnText.textContent = "Tentar Novamente";
                
                // Alerta amigável
                tg.showAlert("Não foi possível carregar o anúncio. Verifique sua conexão e tente novamente.");
            }
        });

        // Prevenção de loops infinitos: se o SDK demorar muito, logar
        setTimeout(() => {
            if (typeof show_11229956 !== 'function') {
                log("Aviso: SDK ainda não disponível após 5 segundos");
            }
        }, 5000);

    </script>
</body>
</html>
